### model
model_name_or_path: tools/models/GLM-OCR
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### dataset
dataset_dir: database/gp8_measure_sequence_v1/llamafactory
dataset: gp8_measure_sequence_train
eval_dataset: gp8_measure_sequence_validation
template: glm_ocr
cutoff_len: 2304
preprocessing_num_workers: 8
overwrite_cache: false

### output
output_dir: output/glm_ocr_measure_sequence_lora
logging_steps: 10
save_steps: 2000
eval_steps: 2000
eval_strategy: steps
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
report_to: none

### train -- RTX 20-series cards require FP16 rather than BF16
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_steps: 350
fp16: true
bf16: false
gradient_checkpointing: true
